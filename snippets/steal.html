<!-- 
偷取目标:
  document.innerHTML
  document.cookie -> HttpOnly: false (jwt, session...)
  localStorage.get/set()
  CSRF

oob 带外方式:
  navigator.sendBeacon fetch
  form.submit
  location open
  CSRF
-->

<!DOCTYPE html>
<html lang="en">

<body>
  <form action="/demo/steal">
    <input type="text" name="q">
    <input type="submit" value="search">
  </form>
  <div id="holder"></div>
  <script>
    document.cookie = 'flag=flag{xss_target}; path=/'
  </script>
  <script>
    const query = new URLSearchParams(location.search).get('q')
    if (query) {
      document.title = `Searching ${query}`
      holder.innerHTML = `<h2>Search result for ${query}</h2>
      <ul>
        <li>choose life?!</li>
        <li>choose life?!</li>
      </ul>
      `
    }
  </script>
</body>

</html>
